server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip für gängige Asset-Typen
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Health-Endpoint für K8s-Probes
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Gehashte Vite-Assets dürfen lange gecacht werden
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA-Fallback: unbekannte Routen auf index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html nie cachen, damit Deploys sofort sichtbar sind
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
